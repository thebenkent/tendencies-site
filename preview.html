<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tendencies · Trusted By · preview</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; background: #0a0a0a; color: #fff;
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .label { display: block; text-align: center; letter-spacing: .25em;
           font-size: 12px; color: #b8ff3a; padding: 48px 0 24px; }
  .marquee { overflow: hidden; border-top: 1px solid #1a1a1a;
             border-bottom: 1px solid #1a1a1a; }
  .track   { display: flex; align-items: center; gap: 64px; padding: 32px 0;
             width: max-content; animation: slide 36s linear infinite; }
  .track:hover { animation-play-state: paused; }
  .logo { flex: 0 0 auto; width: 120px; height: 64px;
          color: #e6e6e6; display: grid; place-items: center; }
  .logo svg { width: 100%; height: 100%; max-height: 64px; }
  @keyframes slide {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 32px;
          max-width: 1200px; margin: 48px auto; padding: 0 24px; }
  .cell { background: #141414; border: 1px solid #1f1f1f; border-radius: 8px;
          aspect-ratio: 1; display: grid; place-items: center; color: #fff; }
  .cell svg { width: 70%; height: 70%; }
  .cell span { position: absolute; margin-top: 110px; font-size: 11px;
               letter-spacing: .1em; color: #666; text-transform: uppercase; }
  h2 { text-align: center; font-weight: 400; letter-spacing: .3em;
       font-size: 13px; color: #888; text-transform: uppercase; margin: 72px 0 0; }
</style>
</head>
<body>

<span class="label">TRUSTED BY · carousel preview</span>

<div class="marquee">
  <div class="track">
    <!-- First pass -->
    <div class="logo"><object data="Colas.svg"    type="image/svg+xml"></object></div>
    <div class="logo"><object data="Dragon.svg"   type="image/svg+xml"></object></div>
    <div class="logo"><object data="Hydroflow.svg" type="image/svg+xml"></object></div>
    <div class="logo"><object data="Kerastase.svg" type="image/svg+xml"></object></div>
    <div class="logo"><object data="Parrotdog.svg" type="image/svg+xml"></object></div>
    <div class="logo"><object data="Solero.svg"   type="image/svg+xml"></object></div>
    <div class="logo"><object data="Streets.svg"  type="image/svg+xml"></object></div>
    <div class="logo"><object data="Swire.svg"    type="image/svg+xml"></object></div>
    <div class="logo"><object data="Unilever.svg" type="image/svg+xml"></object></div>
    <div class="logo"><object data="v.svg"        type="image/svg+xml"></object></div>
    <!-- Duplicate pass for seamless loop -->
    <div class="logo"><object data="Colas.svg"    type="image/svg+xml"></object></div>
    <div class="logo"><object data="Dragon.svg"   type="image/svg+xml"></object></div>
    <div class="logo"><object data="Hydroflow.svg" type="image/svg+xml"></object></div>
    <div class="logo"><object data="Kerastase.svg" type="image/svg+xml"></object></div>
    <div class="logo"><object data="Parrotdog.svg" type="image/svg+xml"></object></div>
    <div class="logo"><object data="Solero.svg"   type="image/svg+xml"></object></div>
    <div class="logo"><object data="Streets.svg"  type="image/svg+xml"></object></div>
    <div class="logo"><object data="Swire.svg"    type="image/svg+xml"></object></div>
    <div class="logo"><object data="Unilever.svg" type="image/svg+xml"></object></div>
    <div class="logo"><object data="v.svg"        type="image/svg+xml"></object></div>
  </div>
</div>

<h2>all ten · tile view</h2>
<div class="grid">
  <div class="cell"><object data="Colas.svg"    type="image/svg+xml"></object></div>
  <div class="cell"><object data="Dragon.svg"   type="image/svg+xml"></object></div>
  <div class="cell"><object data="Hydroflow.svg" type="image/svg+xml"></object></div>
  <div class="cell"><object data="Kerastase.svg" type="image/svg+xml"></object></div>
  <div class="cell"><object data="Parrotdog.svg" type="image/svg+xml"></object></div>
  <div class="cell"><object data="Solero.svg"   type="image/svg+xml"></object></div>
  <div class="cell"><object data="Streets.svg"  type="image/svg+xml"></object></div>
  <div class="cell"><object data="Swire.svg"    type="image/svg+xml"></object></div>
  <div class="cell"><object data="Unilever.svg" type="image/svg+xml"></object></div>
  <div class="cell"><object data="v.svg"        type="image/svg+xml"></object></div>
</div>

</body>
</html>
